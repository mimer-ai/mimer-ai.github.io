{% extends "base.html" %}
{% block content %}
<div class="filters">
    <div class="filter-group">
        <label>Skill:</label>
        <select id="filter-skill">
            <option value="">All</option>
            <option value="ai">AI</option>
            <option value="data">Data</option>
            <option value="programming">Programming</option>
        </select>
    </div>
    <div class="filter-group">
        <label>Difficulty:</label>
        <select id="filter-difficulty">
            <option value="">All</option>
            <option value="beginner">Beginner</option>
            <option value="intermediate">Intermediate</option>
            <option value="advanced">Advanced</option>
        </select>
    </div>
</div>

<div class="lesson-grid" id="lesson-grid">
    {% for page in section.pages %}
    {% if page.tags %}
    <article
        class="lesson-card"
        data-title="{{ page.title }}"
        data-description="{{ page.description }}"
        data-tags="{{ page.tags | json_encode | safe }}"
        data-skill="{{ page.skill | json_encode | safe }}"
        data-difficulty="{{ page.difficulty }}"
    >
        <h2>{{ page.title }}</h2>
        <p>{{ page.description }}</p>
        <div class="badge-container">
            {% for skill in page.skill %}
            <span class="badge skill-{{ skill }}">{{ skill }}</span>
            {% endfor %}
            <span class="badge difficulty-{{ page.difficulty }}">{{ page.difficulty }}</span>
        </div>
    </article>
    {% endif %}
    {% endfor %}
</div>
{% endblock %}
