<footer class="bg-slate-800 border-t border-slate-700">
    <div class="container mx-auto px-4 py-8">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-8">
            <div>
                <a
                    href="{{ config.extra.nav.logo_url }}"
                    class="flex items-center space-x-2 mb-4"
                >
                    <img
                        src="{{ config.extra.nav.logo_src }}"
                        alt="{{ config.extra.nav.logo_alt }}"
                        class="h-10 w-auto"
                    />
                </a>
            </div>
            <div>
                <a
                    href="https://linkedin.com"
                    target="_blank"
                    rel="noopener noreferrer"
                    class="text-slate-400 hover:text-white transition-colors"
                >
                    <svg
                        class="w-6 h-6"
                        fill="currentColor"
                        viewBox="0 0 24 24"
                        aria-hidden="true"
                    >
                        <path
                            d="M416 32H31.9C14.3 32 0 46.5 0 64.3v383.4C0 465.5 14.3 480 31.9 480H416c17.6 0 32-14.5 32-32.3V64.3c0-17.8-14.4-32.3-32-32.3zM135.4 416H69V202.2h66.5V416zm-33.2-243c-21.3 0-38.5-17.3-38.5-38.5S80.9 96 102.2 96c21.2 0 38.5 17.3 38.5 38.5 0 21.3-17.2 38.5-38.5 38.5zm282.1 243h-66.4V312c0-24.8-.5-56.7-34.5-56.7-34.6 0-39.9 27-39.9 54.9V416h-66.4V202.2h63.7v29.2h.9c8.9-16.8 30.6-34.5 62.9-34.5 67.2 0 79.7 44.3 79.7 101.9V416z"
                        ></path>
                    </svg>
                </a>
            </div>
            <div>
                <h3 class="text-white font-semibold mb-4">
                    {{ config.extra.footer.quick_links_title }}
                </h3>
                <ul class="space-y-2">
                    {% for link in config.extra.footer.quick_links %}
                        <li>
                            <a
                                href="{{ link.url }}"
                                class="text-slate-400 hover:text-white transition-colors"
                                >{{ link.name }}</a
                            >
                        </li>
                    {% endfor %}
                </ul>
            </div>
            <div>
                <h3 class="text-white font-semibold mb-4">
                    Contact Info
                </h3>
                <p class="text-slate-400">info@mimer-ai.eu</p>
            </div>
        </div>
        <div
            class="border-t border-slate-700 mt-8 pt-8 text-center text-slate-500"
        >
            <p>&copy; 2026 Mimer AI Factory. All rights reserved.</p>
        </div>
    </div>
</footer>
