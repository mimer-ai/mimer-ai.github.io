# The URL the site will be built for
base_url = "https://learn.mimer-ai.eu"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = false

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = true

taxonomies = [
    { name = "skill", feed = false, render = false },
    { name = "difficulty", feed = false, render = false },
    { name = "maturity", feed = false, render = false },
]

[markdown]

[markdown.highlighting]
theme = "catppuccin-mocha"

[search]
index_format = "fuse_javascript" # or "fuse_json"

[extra]
# Put all your custom variables here

# Define badge colors for Skill, Difficulty Level, and Maturity
badge_colors = {
    skill = {
        ai = "bg-indigo-700",
        gen_ai = "bg-pink-500",
        hpc = "bg-orange-700",
        cloud_computing = "bg-sky-700",
        programming = "bg-violet-700",
        julia = "bg-purple-700",
        data_science = "bg-cyan-700",
        life_science = "bg-emerald-700",
        machine_learning = "bg-pink-600",
        mlops = "bg-violet-700",
        agentic = "bg-indigo-700",
        pytorch = "bg-orange-700",
        devops = "bg-teal-600"
    },
    difficulty = { beginner = "text-emerald-400", intermediate = "text-amber-400", advanced = "text-red-400" },
    maturity = { alpha = "text-sky-400", beta = "text-blue-400", stable = "text-blue-500" }
}

[extra.colors]
# Color palette - Tailwind CSS color classes used throughout the site

# Background colors
bg_primary = "bg-slate-900"            # Main page background
bg_primary_alpha = "bg-slate-900/80"   # Semi-transparent page background overlay
bg_secondary = "bg-slate-800"          # Secondary container backgrounds (header, footer, filter panel)
bg_secondary_alpha = "bg-slate-800/50" # Semi-transparent secondary background
bg_interactive = "bg-slate-700"        # Interactive element backgrounds (Clear Filters button)
bg_interactive_hover = "bg-slate-600"  # Interactive element hover backgrounds
bg_card = "bg-[#122855]"               # Lesson card background color

# Accent colors
accent_primary = "bg-indigo-600"       # Primary accent buttons (Get Access, Show the lesson)
accent_primary_hover = "bg-indigo-700" # Primary accent button hover state
accent_text_hover = "text-indigo-400"  # Accent text color on hover

# Border colors
border_primary = "border border-slate-800"   # Primary borders (header)
border_secondary = "border border-slate-700" # Secondary borders (footer, filter panel, lesson cards)
border_input = "border border-slate-600"     # Input and badge borders (filter dropdowns, difficulty/maturity badges)

# Text colors
text_primary = "text-white"            # Primary text (headings, titles, main content)
text_secondary = "text-gray-100"       # Secondary text (subheadings)
text_nav = "text-slate-300"           # Navigation text (header nav links, footer social icon)
text_subtle = "text-slate-400"        # Subtle text (descriptions, filter labels, badge labels, footer links)
text_copyright = "text-slate-500"     # Copyright text (footer bottom text)

# Focus colors
focus_ring = "focus:ring-indigo-500"  # Focus ring color for interactive elements

# Shadow colors
shadow_primary = "shadow-xl"                 # Primary shadow (lesson cards)
shadow_hover = "group-hover:shadow-slate-400/20" # Hover shadow effect (lesson cards)

# Navigation configuration
