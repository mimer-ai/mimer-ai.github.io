# The URL the site will be built for
base_url = "https://learn.mimer-ai.eu"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = false

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = true

taxonomies = [
    { name = "skill", feed = false, render = false },
    { name = "difficulty", feed = false, render = false },
    { name = "maturity", feed = false, render = false },
]

[markdown]

[markdown.highlighting]
theme = "catppuccin-mocha"

[search]
index_format = "fuse_javascript" # or "fuse_json"

[extra]
# Put all your custom variables here

# Define badge colors for Skill, Difficulty Level, and Maturity
badge_colors = {
    skill = {
        ai = "bg-indigo-700",
        gen_ai = "bg-pink-500",
        hpc = "bg-orange-700",
        cloud_computing = "bg-sky-700",
        programming = "bg-violet-700",
        julia = "bg-purple-700",
        data_science = "bg-cyan-700",
        life_science = "bg-emerald-700",
        machine_learning = "bg-pink-600",
        mlops = "bg-violet-700",
        agentic = "bg-indigo-700",
        pytorch = "bg-orange-700",
        devops = "bg-teal-600"
    },
    difficulty = { beginner = "text-emerald-400", intermediate = "text-amber-400", advanced = "text-red-400" },
    maturity = { alpha = "text-sky-400", beta = "text-blue-400", stable = "text-blue-500" }
}

[extra.colors]
# Color palette - Tailwind CSS color classes used throughout the site
# Background colors
bg_primary = "bg-slate-900"
bg_primary_alpha = "bg-slate-900/80"
bg_secondary = "bg-slate-800"
bg_secondary_alpha = "bg-slate-800/50"
bg_tertiary = "bg-slate-700"
bg_quaternary = "bg-slate-600"
bg_card = "bg-[#122855]"

# Accent colors
accent_primary = "bg-indigo-600"
accent_primary_hover = "bg-indigo-700"
accent_text_hover = "text-indigo-400"

# Border colors
border_primary = "border border-slate-800"
border_secondary = "border border-slate-700"
border_tertiary = "border border-slate-600"

# Text colors
text_primary = "text-white"
text_secondary = "text-gray-100"
text_tertiary = "text-slate-300"
text_quaternary = "text-slate-400"
text_quinary = "text-slate-500"

# Focus colors
focus_ring = "focus:ring-indigo-500"

# Shadow colors
shadow_primary = "shadow-xl"
shadow_hover = "group-hover:shadow-slate-400/20"

